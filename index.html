        const encoder = new TextEncoder();
        const decoder = new TextDecoder();

        async function decryptData(secret, salt, iv, encryptedData, aad) {
            const key = await pbkdf2(secret, salt, "SHA-256", 600000, 32);            
            const cryptoKey = await window.crypto.subtle.importKey("raw", key.buffer, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
            const decryptedData = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: iv,
                    additionalData: aad
                },
                cryptoKey,
                encryptedData.buffer
            );

            return decryptedData;
        }

        async function pbkdf2(secret, salt, hash, iterations, len) {
            const cryptoKey = await window.crypto.subtle.importKey("raw", secret.buffer, { name: "PBKDF2" }, false, ["deriveKey", "deriveBits"]);
            const dk = await window.crypto.subtle.deriveBits(
                {
                    name: "PBKDF2",
                    hash: hash,
                    salt: salt,
                    iterations: iterations
                },
                cryptoKey,
                len * 8// Bytes to bits
            );  

            return new Uint8Array(dk);
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const API = {
            dates_with_patterns_wasm: (game, patternMap, match_all) => JSON.parse(wasm_bindgen.dates_with_patterns_wasm(game, JSON.stringify(patternMap), match_all)), 
            game_data: (game, asc) => JSON.parse(wasm_bindgen.game_data_wasm(game, asc)),
            static_data: () => JSON.parse(wasm_bindgen.static_data_wasm()),
            wln: (game, date) => JSON.parse(wasm_bindgen.wln_wasm(game, date)),
            stats_quick: (game, start_date, end_date, percent_kvps) => {
                let input = JSON.stringify([{game: game, wln_range: `${game}:${start_date}:${end_date}`, key_and_percents: percent_kvps}]);
                //console.log(input);
                return JSON.parse(wasm_bindgen.stats_quick_wasm(input));
            },
            generate_number: (data) => {
                //console.log(data);
                let res = JSON.parse(wasm_bindgen.generate_numbers_wasm(JSON.stringify(data)));
                //console.log(res);
                return res;
            }
        };
        const patternTypeNames = ["Closest Played Digit", "Low Med High", "New Number", "Odd Even", "Sequential", "Sum Range", "Smallest Number Gap", "Largest Number Gap", "All Gaps"];
        const getPillColor = (patternType) => {
            switch(patternType) {
                case 'Closest Played Digit':
                    return 'blue';
                case 'Low Med High':
                    return 'DarkRed';
                case 'New Number':
                    return 'green';
                case 'Odd Even':
                    return 'orange';
                case 'Sequential':
                    return 'teal';
                case 'Sum Range':
                    return 'saddlebrown';
                case 'Smallest Number Gap':
                    return 'slategray';
                case 'Largest Number Gap':
                    return 'MediumPurple';
                case 'All Gaps':
                    return 'DarkSlateGrey';                
                default:
                    return 'seagreen';
            } 
        };

        const execute_react_code = () => {
            wasm_bindgen.init_panic_hook();
            wasm_bindgen.load_numbers(JSON.stringify(wln_pt_pkg.wlns));

                                                                return (
                                                                    <li className="nav-item" role="presentation">
                                                                        <button className="nav-link" id={`pt-${patTypeNoSpace}-tab`} data-bs-toggle="tab" data-bs-target={`#pt-${patTypeNoSpace}-tab-content`} type="button" role="tab" aria-controls={`#pt-${patTypeNoSpace}-tab-content`} aria-selected="false">{`${patType}-${patValues.map(x => x.count).reduce((sum, v) => sum + v, 0)}`}</button>
                                                                    </li>
                                                                )
                                                            })}
                                                        </ul>                                    
                                                        <div className="tab-content" id="pattern-tracker-tab-content">
                                                            {Object.entries(gs_all_patterns).map(([patType, patValues]) => {
                                                                const patTypeNoSpace = staticDataPkg.all_game_settings[gs_id].name.replaceAll(' ', '') + patType.replaceAll(' ', '');
                                                                return (
                                                                    <div className="tab-pane fade" id={`pt-${patTypeNoSpace}-tab-content`} role="tabpanel" aria-labelledby={`pt-${patTypeNoSpace}-tab`}>
                                                                        <div className="row g-3">
                                                                            <div className="col-1">
                                                                                <b>W</b>                  
                                                                            </div>
                                                                            <div className="col-1">
                                                                                <b>I</b>                                                                                       
                                                                            </div>
                                                                            <div className="col-7">
                                                                                <b>Pattern</b>                                                                                  
                                                                            </div>
                                                                            <div className="col-1">
                                                                                <b>%</b>                                                                                  
                                                                            </div>
                                                                            <div className="col-2">
                                                                                <b>C</b>                                                                                  
                                                                            </div>                                                                                     
                                                                        </div>
                                                                        {patValues.map((patValue, idx) => {
                                                                            let patTypeNoSpaceKey = `${patTypeNoSpace}-${idx}`;
                                                                            let ckboxId = `chkbox-${patTypeNoSpaceKey}`;
                                                                            let ckboxAllId = `chkboxAll-${patTypeNoSpaceKey}`;
                                                                            return (
                                                                                <div className="row g-3">
                                                                                    <div className="col-1">
                                                                                        <input className="form-check-input" type="checkbox" id={ckboxId} checked={selectedPatternMap.has(ckboxId)} onChange={(e) => updateSelectedPatternMap("P", ckboxId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-1">
                                                                                        <input className="form-check-input" type="checkbox" id={ckboxAllId} checked={selectedPatternMap.has(ckboxAllId)} onChange={(e) => updateSelectedPatternMap("A", ckboxAllId, gs_id, patType, patValue, e)} />                                                                                        
                                                                                    </div>
                                                                                    <div className="col-7" title={`${patValue.count}`}>
                                                                                        <label className="form-check-label">
                                                                                            {patValue.pattern}
                                                                                        </label>                                                                                  
                                                                                    </div>
                                                                                    <div className="col-1"  title={`${patValue.count}`}>
                                                                                        <label className="form-check-label">
                                                                                            {patValue.percent}
                                                                                        </label>                                                                                  
                                                                                    </div>
                                                                                    <div className="col-2">
                                                                                        <label className="form-check-label">
                                                                                            {patValue.count}
                                                                                        </label>                                                                                  
                                                                                    </div>                                                                                   
                                                                                </div>
                                                                            )
                                                                        })}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>                                       
                                    </div>

                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#wlnsByPatterns">WLNs</button>
                                        <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="modal" id="wlnsByPatterns">
                            <div className="modal-dialog modal-dialog-scrollable">
                                <div className="modal-content">
                                    <div className="modal-header">
                                        <h4 className="modal-title">WLNs By Patterns</h4>
                                        <button type="button" className="btn-close" data-bs-toggle="modal" data-bs-target="#allPatternsModal"></button>
                                    </div>

                                    <div className="modal-body" style={{overflowY: "scroll"}}>                                        
                                        <WLNs listProp={wlnPatternDates} getWLN={(date) => API.wln(gameData.game, date)} startAtBeginningOfList={false} />                          
                                    </div>

                                    <div className="modal-footer">
                                        <button type="button" className="btn btn-danger" data-bs-toggle="modal" data-bs-target="#allPatternsModal">Close</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
: ""

                );
            }

            const GLNBlock = ({ count, title, onChange, body }) => {
                return (
                    <table>
                        <tbody>
                            <tr>
                                <td style={{ width: "100%", fontSize: "larger", fontWeight: "bold" }}>{title}</td>
                                <td style={{ width: "100%", textAlign: "right" }}><DDLNumber value={count} min={0} max={20} onChange={(val) => onChange(title, val)} /></td>
                            </tr>
                            {body && <tr>
                                <td colSpan="2">
                                    {body}
                                </td>
                            </tr>}
                        </tbody>
                    </table>
                );
            };

            const PTCarousel = ({ ls_group, gameDataProp }) => {
                const [gameData, setGameData] = React.useState(null);
                const [showAll, setShowAll] = React.useState(true);
                
                const reset = () => {                    
                    setGameData(gameDataProp);
                    setShowAll(true);
                };

                if (!gameData || gameDataProp.game !== gameData.game) {
                    reset();
                    return;                
                }

                const list = ls_group.filter(x => showAll || x.item.active);

                return (
                    <div>
                        <div className="form-check form-switch">
                            <input className="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault" checked={showAll} onChange={() => setShowAll(!showAll)} />
                            <label className="form-check-label" htmlFor="flexSwitchCheckDefault">Show All</label>
                        </div>
                        {list && list.length ? list.filter(x => showAll || x.item.active).map((x, idx) => 
                            <div className="card">
                                <div className="card-header" style={{backgroundColor: '#0096c2'}}>
                                    {`Pattern Tracker (${idx + 1}/${list.length})`}
                                </div>
                                <div className="card-body">
                                    {list[idx] ? <pre>{JSON.stringify(list[idx], null, 2)}</pre> : ""}
                                </div>
                            </div>    
                        ) : <div className="card">
                                <div className="card-header" style={{backgroundColor: '#0096c2'}}>
                                    {`Pattern Tracker (0/${list.length})`}
                                </div>
                                <div className="card-body">                                
                                </div>
                            </div>}
                    </div>
                );
            }

            const App = ({ }) => {
                const [gameData, setGameData] = React.useState(API.game_data("RollingCash5", false));
                
                const handleGameChange = (e) => {
                    setGameData(API.game_data(e.target.value, false));
                };
            
                return (<div id="app">                    
                    <select className="form-select" aria-label="Game" onChange={handleGameChange} value={gameData.game}>
                        {staticDataPkg && staticDataPkg.games.map(x => <option key={x}>{x}</option>)}
                    </select>
                    <ul className="nav nav-tabs" id="myTab" role="tablist">
                        <li className="nav-item" role="presentation">
                            <button className="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
                                role="tab" aria-controls="home" aria-selected="true">Winning Lottery Numbers</button>
                        </li>
                        <li className="nav-item" role="presentation">
                            <button className="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button"
                                role="tab" aria-controls="profile" aria-selected="false">Generate Lottery Numbers</button>
                        </li>
                        <li className="nav-item" role="presentation">
                            <button className="nav-link" id="nogamegen-tab" data-bs-toggle="tab" data-bs-target="#nogamegen" type="button"
                                role="tab" aria-controls="nogamegen" aria-selected="false">Generate Lottery Numbers2</button>
                        </li>
                    </ul>
                    <div className="tab-content" id="myTabContent">
                        <div className="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
                            <WLNTab gameDataProp={gameData} />
                        </div>
                        <div className="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                            <GenLNTab gameDataProp={gameData} />
                        </div>
                        <div className="tab-pane fade" id="nogamegen" role="tabpanel" aria-labelledby="profile-tab">
                            <GenLNTab2 gameDataProp={gameData} />
                        </div>
                    </div>
                    <div style={{fontSize: "0.5em"}}>timestamp:2026-06-14T19-10-27<br />app sec:1535<br />app min:25<br />build sec:25.535<br />local:true</div>
                    <div className="modal" id="patternTrackerModal">
                        <div className="modal-dialog modal-dialog-scrollable">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h4 className="modal-title">Pattern Tracker Data</h4>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div className="modal-body">
                                    <ul className="nav nav-tabs" id="pattern-tracker-tab" role="tablist">
                                        {Object.entries(wln_pt_pkg.pattern_tracker[gameData.game].ls_groups).map(([k, v]) => {
                                            return (
                                                <li className="nav-item" role="presentation">
                                                    <button className="nav-link" id={`pt-${k}-tab`} data-bs-toggle="tab" data-bs-target={`#pt-${k}-tab-content`} type="button" role="tab" aria-controls={`#pt-${k}-tab-content`} aria-selected="false">{staticDataPkg.all_game_settings[k].name}</button>
                                                </li>
                                            )
                                        })}
                                    </ul>                                    
                                    <div className="tab-content" id="pattern-tracker-tab-content">
                                        {Object.entries(wln_pt_pkg.pattern_tracker[gameData.game].ls_groups).map(([k, v]) => {
                                            return (
                                                <div className="tab-pane fade" id={`pt-${k}-tab-content`} role="tabpanel" aria-labelledby={`pt-${k}-tab`}>
                                                    <PTCarousel ls_group={v} gameDataProp={gameData} />
                                                </div>
                                            )
                                        })}
                                    </div>                                    
                                </div>

                                <div className="modal-footer">
                                    <div className="row g-3">
                                        <div className="col-6">
                                            Start Index: {wln_pt_pkg.pattern_tracker[gameData.game].start_idx}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            End Index: {wln_pt_pkg.pattern_tracker[gameData.game].end_idx}                                                                              
                                        </div>                                        
                                        <div className="col-6">
                                            Start Date: {wln_pt_pkg.pattern_tracker[gameData.game].start_date}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            End Date: {wln_pt_pkg.pattern_tracker[gameData.game].end_date}                                                                              
                                        </div>
                                        <div className="col-6">
                                            WLNS Count: {wln_pt_pkg.pattern_tracker[gameData.game].wlns_count}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            Percent List: {wln_pt_pkg.pattern_tracker[gameData.game].percent_list.join(', ')}                                                                              
                                        </div>
                                        <div className="col-6">
                                            Thread Count: {wln_pt_pkg.pattern_tracker[gameData.game].thread_count}                                                                                       
                                        </div>
                                        <div className="col-6">
                                            Total Count: {wln_pt_pkg.pattern_tracker[gameData.game].total_count}                                                                              
                                        </div>
                                        <div className="col-10">
                                            Time: {wln_pt_pkg.pattern_tracker[gameData.game].time} seconds                                                                                       
                                        </div>
                                        <div className="col-2">
                                            <button type="button" className="btn btn-danger" data-bs-dismiss="modal">Close</button>                                                                                
                                        </div>                                                                                  
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>);
            };

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(
                <React.StrictMode>
                    <App />
                </React.StrictMode>
            );
        }
        setTimeout(execute_react_code, 500);
    </script>
</body>

</html>
